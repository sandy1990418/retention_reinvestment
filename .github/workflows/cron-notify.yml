name: Daily Stock Notification

on:
  schedule:
    # Every weekday at 8:00 AM Taiwan time (UTC+8) = 0:00 UTC
    # stock_cache is refreshed monthly by cron-scrape
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render (prevent cold start)
        run: |
          curl -s "${{ secrets.RENDER_APP_URL }}/health" --max-time 60 --retry 2 || true
          sleep 10

      - name: Trigger daily notification
        run: |
          curl -X POST "${{ secrets.RENDER_APP_URL }}/cron/notify" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            --retry 2
