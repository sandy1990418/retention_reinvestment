name: Scrape Stock Data to Supabase

on:
  schedule:
    # 1st of every month, 8:00 AM Taiwan time (UTC+8) = 0:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Write storage state
        run: printf '%s' "$STORAGE_STATE" > storage_state.json
        env:
          STORAGE_STATE: ${{ secrets.STORAGE_STATE }}

      - name: Scrape and upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: uv run python scripts/scrape_to_supabase.py
        timeout-minutes: 5
